name: E2E

on:
  push:
    branches: [main]
    paths:
      - "internal/**"
      - "cmd/**"
      - "scripts/e2e-verify-agents.py"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDKs
        run: pip install anthropic openai

      - name: Build prism
        run: go build -o prism ./cmd/prism

      - name: Configure prism
        env:
          E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
        run: |
          mkdir -p ~/.prism
          cat > ~/.prism/config.yaml << 'YAML'
          providers:
            token-plan:
              api_key: ${E2E_API_KEY}
              base_urls:
                openai: https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
                anthropic: https://token-plan.cn-beijing.maas.aliyuncs.com/apps/anthropic
          agents:
            claude:
              current: token-plan
              model: qwen3.8-max-preview
            codex:
              current: token-plan
              model: qwen3.8-max-preview
            gemini:
              current: token-plan
              model: qwen3.8-max-preview
            opencode:
              current: token-plan
              model: qwen3.8-max-preview
            qwen-code:
              current: token-plan
              model: qwen3.8-max-preview
            zcode:
              current: token-plan
              model: glm-5.2
          YAML

      - name: Sync all agents
        env:
          E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
        run: |
          export E2E_API_KEY
          ./prism validate
          ./prism sync
          ./prism status

      - name: Verify all 6 agents with real API calls
        run: python3 scripts/e2e-verify-agents.py
